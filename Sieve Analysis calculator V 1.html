<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sieve Analysis Calculator & Editor</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { jsPDF } = window.jspdf;

        // --- UTILITY ---
        const formatDateDDMMYYYY = (isoDate) => {
            if (!isoDate) return '-';
            const parts = isoDate.split('-');
            return parts.length === 3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : isoDate;
        };

        // --- ICONS ---
        const Calculator = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="14"></line><line x1="12" y1="14" x2="12" y2="14"></line><line x1="8" y1="14" x2="8" y2="14"></line><line x1="16" y1="18" x2="16" y2="18"></line><line x1="12" y1="18" x2="12" y2="18"></line><line x1="8" y1="18" x2="8" y2="18"></line></svg>);
        const Save = () => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>);
        const Folder = () => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>);
        const DownloadIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>);
        const AlertCircle = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>);
        const CheckCircle = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>);
        const RefreshCw = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>);

        // --- DATA ---
        const SIEVES = [
            { id: 80, label: '80 mm' }, { id: 63, label: '63 mm' }, { id: 40, label: '40 mm' },
            { id: 20, label: '20 mm' }, { id: 16, label: '16 mm' }, { id: 12.5, label: '12.5 mm' },
            { id: 10, label: '10 mm' }, { id: 4.75, label: '4.75 mm' }, { id: 2.36, label: '2.36 mm' },
            { id: 1.18, label: '1.18 mm' }, { id: 0.6, label: '600 micron' }, { id: 0.3, label: '300 micron' },
            { id: 0.15, label: '150 micron' }
        ];

        const MIN_SAMPLE_WEIGHTS = { 63: 50000, 40: 15000, 20: 2000, 16: 2000, 12.5: 1000, 10: 500, 4.75: 200 };
        const MAX_RETAINED_COARSE = { 40: [8000, 3500], 20: [4000, 2000], 16: [3000, 1500], 12.5: [3000, 1500], 10: [2000, 1000], 4.75: [1000, 500] };
        const MAX_RETAINED_FINE = { 2.36: 200, 1.18: 100, 0.6: 75, 0.3: 50, 0.15: 40 };

        const SPECS = {
            'graded_20': { name: 'Graded: 20 mm', group: 'Coarse Aggregates (Graded)', type: 'coarse', nominalSize: 20, sieves: [40, 20, 16, 12.5, 10, 4.75, 2.36], limits: { 40: [100, 100], 20: [95, 100], 10: [25, 55], 4.75: [0, 10] } },
            'graded_40': { name: 'Graded: 40 mm', group: 'Coarse Aggregates (Graded)', type: 'coarse', nominalSize: 40, sieves: [80, 63, 40, 20, 16, 12.5, 10, 4.75, 2.36], limits: { 80: [100, 100], 40: [95, 100], 20: [30, 70], 10: [10, 35], 4.75: [0, 5] } },
            'fine_zone_2': { name: 'Zone II', group: 'Fine Aggregates', type: 'fine', nominalSize: 4.75, sieves: [10, 4.75, 2.36, 1.18, 0.6, 0.3, 0.15], limits: { 10: [100, 100], 4.75: [90, 100], 2.36: [75, 100], 1.18: [55, 90], 0.6: [35, 59], 0.3: [8, 30], 0.15: [0, 10] } }
            // Note: Add other zones/sizes as per original spec if needed
        };

        const StatusBadge = ({ pass }) => (
            <span className={`inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ${pass ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                {pass ? 'Pass' : 'Fail'}
            </span>
        );

        function SieveAnalysisApp() {
            // --- STATE ---
            const [specKey, setSpecKey] = useState('graded_20');
            const [weights, setWeights] = useState({});
            const [panWeight, setPanWeight] = useState(0);
            const [sieveDiameterIdx, setSieveDiameterIdx] = useState(0);
            const [clientName, setClientName] = useState('Client');
            const [projectName, setProjectName] = useState('Construction Project');
            const [refNo, setRefNo] = useState('PEC/CE/SM/1');
            const [testDate, setTestDate] = useState(new Date().toISOString().split('T')[0]);
            const [description, setDescription] = useState('Testing of Aggregate sample.');

            // --- PERSISTENCE ---
            useEffect(() => {
                const saved = localStorage.getItem('sieve_data_cache');
                if (saved) {
                    const d = JSON.parse(saved);
                    setSpecKey(d.specKey); setWeights(d.weights); setPanWeight(d.panWeight);
                    setClientName(d.clientName); setProjectName(d.projectName); setRefNo(d.refNo);
                    setTestDate(d.testDate); setDescription(d.description); setSieveDiameterIdx(d.sieveDiameterIdx || 0);
                }
            }, []);

            useEffect(() => {
                const data = { specKey, weights, panWeight, clientName, projectName, refNo, testDate, description, sieveDiameterIdx };
                localStorage.setItem('sieve_data_cache', JSON.stringify(data));
            }, [specKey, weights, panWeight, clientName, projectName, refNo, testDate, description, sieveDiameterIdx]);

            const exportData = () => {
                const data = JSON.stringify({ specKey, weights, panWeight, clientName, projectName, refNo, testDate, description, sieveDiameterIdx });
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Sieve_Analysis_${refNo.replace(/\//g, '-')}.json`;
                a.click();
            };

            const importData = (e) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const d = JSON.parse(event.target.result);
                    setSpecKey(d.specKey); setWeights(d.weights); setPanWeight(d.panWeight);
                    setClientName(d.clientName); setProjectName(d.projectName); setRefNo(d.refNo);
                    setTestDate(d.testDate); setDescription(d.description); setSieveDiameterIdx(d.sieveDiameterIdx || 0);
                };
                reader.readAsText(e.target.files[0]);
            };

            // --- CALCULATIONS ---
            const currentSpec = SPECS[specKey] || SPECS['graded_20'];
            const sievesToShow = currentSpec.sieves.map(id => SIEVES.find(s => s.id === id));

            const results = useMemo(() => {
                let total = parseFloat(panWeight) || 0;
                sievesToShow.forEach(s => total += parseFloat(weights[s.id]) || 0);

                let cum = 0;
                const rows = sievesToShow.map(s => {
                    const wt = parseFloat(weights[s.id]) || 0;
                    const pRet = total > 0 ? (wt / total) * 100 : 0;
                    cum += pRet;
                    const pFin = Math.max(0, 100 - cum);
                    const lim = currentSpec.limits[s.id];
                    const status = lim ? (pFin >= lim[0] - 0.01 && pFin <= lim[1] + 0.01) : null;
                    
                    let maxAllowed = currentSpec.type === 'coarse' ? (MAX_RETAINED_COARSE[s.id] ? MAX_RETAINED_COARSE[s.id][sieveDiameterIdx] : null) : MAX_RETAINED_FINE[s.id];
                    
                    return { s, wt, pRet, cum, pFin, limitStr: lim ? `${lim[0]}-${lim[1]}` : '-', status, isOverloaded: maxAllowed && wt > maxAllowed, maxAllowed };
                });

                const fmSieves = [80, 40, 20, 10, 4.75, 2.36, 1.18, 0.6, 0.3, 0.15];
                let fmSum = 0;
                const cumMap = {};
                rows.forEach(r => cumMap[r.s.id] = r.cum);
                fmSieves.forEach(id => {
                    if (cumMap[id] !== undefined) fmSum += cumMap[id];
                    else if (currentSpec.type === 'coarse' && id < (rows[rows.length-1]?.s.id || 0)) fmSum += 100;
                });

                return { total, rows, fm: (fmSum / 100).toFixed(2), isSufficient: total >= (MIN_SAMPLE_WEIGHTS[currentSpec.nominalSize] || 0) };
            }, [weights, panWeight, currentSpec, sieveDiameterIdx]);

            // --- PDF ---
            const generatePDF = () => {
                const doc = new jsPDF();
                doc.setFontSize(14); doc.text("COLLEGE OF ENGINEERING PATHANAPURAM", 105, 20, {align:'center'});
                doc.setFontSize(12); doc.text("SIEVE ANALYSIS REPORT", 105, 30, {align:'center'});
                
                doc.setFontSize(10);
                doc.text(`Ref: ${refNo}`, 14, 45); doc.text(`Date: ${formatDateDDMMYYYY(testDate)}`, 196, 45, {align:'right'});
                doc.text(`Client: ${clientName}`, 14, 52);
                doc.text(`Project: ${projectName}`, 14, 59);

                const tableData = results.rows.map(r => [r.s.label, r.wt, r.pRet.toFixed(2), r.cum.toFixed(2), r.pFin.toFixed(2), r.limitStr, r.status === null ? '-' : (r.status ? 'Pass' : 'FAIL')]);
                tableData.push(['Pan', panWeight, '-', '-', '-', '-', '-']);
                tableData.push(['Total', results.total, '100', '-', '-', '-', '-']);

                doc.autoTable({
                    startY: 70, head: [['Sieve', 'Wt(g)', '% Ret', 'Cum %', '% Finer', 'Limits', 'Status']], body: tableData,
                    headStyles: {fillColor: [29, 78, 216]}
                });

                const finalY = doc.lastAutoTable.finalY + 10;
                doc.text(`Fineness Modulus: ${results.fm}`, 14, finalY);
                doc.save(`${refNo.replace(/\//g, '_')}_report.pdf`);
            };

            return (
                <div className="min-h-screen bg-slate-50 pb-10">
                    <header className="bg-blue-700 text-white p-4 sticky top-0 z-20 shadow-md">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <Calculator />
                                <h1 className="font-bold text-lg">Sieve Analysis Pro</h1>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={exportData} title="Export Data" className="p-2 bg-blue-600 rounded hover:bg-blue-500 transition"><Save /></button>
                                <label title="Import Data" className="p-2 bg-blue-600 rounded hover:bg-blue-500 transition cursor-pointer">
                                    <Folder /><input type="file" className="hidden" accept=".json" onChange={importData} />
                                </label>
                                <button onClick={generatePDF} className="bg-white text-blue-700 px-4 py-2 rounded font-bold flex items-center gap-2 hover:bg-blue-50">
                                    <DownloadIcon /> PDF
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 space-y-6">
                        {/* Project Info */}
                        <section className="bg-white p-6 rounded-xl shadow-sm grid grid-cols-1 md:grid-cols-3 gap-4 border border-slate-200">
                            <div className="md:col-span-2">
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Client Name</label>
                                <input className="w-full border p-2 rounded" value={clientName} onChange={e => setClientName(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Ref Number</label>
                                <input className="w-full border p-2 rounded" value={refNo} onChange={e => setRefNo(e.target.value)} />
                            </div>
                            <div className="md:col-span-2">
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Project Name</label>
                                <input className="w-full border p-2 rounded" value={projectName} onChange={e => setProjectName(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Test Date</label>
                                <input type="date" className="w-full border p-2 rounded" value={testDate} onChange={e => setTestDate(e.target.value)} />
                            </div>
                        </section>

                        {/* Controls */}
                        <section className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">Aggregate Specification</label>
                                <select className="w-full border p-3 rounded-lg bg-slate-50" value={specKey} onChange={e => setSpecKey(e.target.value)}>
                                    {Object.entries(SPECS).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                                </select>
                            </div>
                            {currentSpec.type === 'coarse' && (
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Sieve Diameter</label>
                                    <div className="flex border rounded-lg overflow-hidden">
                                        <button onClick={()=>setSieveDiameterIdx(0)} className={`flex-1 p-3 ${sieveDiameterIdx===0?'bg-blue-600 text-white':'bg-white'}`}>45 cm</button>
                                        <button onClick={()=>setSieveDiameterIdx(1)} className={`flex-1 p-3 ${sieveDiameterIdx===1?'bg-blue-600 text-white':'bg-white'}`}>30 cm</button>
                                    </div>
                                </div>
                            )}
                        </section>

                        {/* Table */}
                        <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 text-slate-500 font-bold border-b">
                                    <tr>
                                        <th className="p-4">Sieve</th>
                                        <th className="p-4">Weight (g)</th>
                                        <th className="p-4">Cum %</th>
                                        <th className="p-4">% Finer</th>
                                        <th className="p-4">Limits</th>
                                        <th className="p-4">Status</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {results.rows.map(r => (
                                        <tr key={r.s.id}>
                                            <td className="p-4 font-medium">{r.s.label}</td>
                                            <td className="p-4">
                                                <input type="number" className={`border p-1 w-24 rounded ${r.isOverloaded?'bg-orange-50 border-orange-400':''}`} value={weights[r.s.id] || ''} onChange={e => setWeights({...weights, [r.s.id]: e.target.value})} />
                                                {r.isOverloaded && <p className="text-[10px] text-orange-600">Max: {r.maxAllowed}g</p>}
                                            </td>
                                            <td className="p-4 text-slate-500">{r.cum.toFixed(2)}</td>
                                            <td className={`p-4 font-bold ${r.status===false?'text-red-600':''}`}>{r.pFin.toFixed(2)}</td>
                                            <td className="p-4 text-slate-400">{r.limitStr}</td>
                                            <td className="p-4">{r.status !== null && <StatusBadge pass={r.status} />}</td>
                                        </tr>
                                    ))}
                                    <tr className="bg-slate-50">
                                        <td className="p-4 font-bold">Pan</td>
                                        <td className="p-4"><input type="number" className="border p-1 w-24 rounded" value={panWeight || ''} onChange={e => setPanWeight(e.target.value)} /></td>
                                        <td colSpan="4" className="p-4 text-xs italic text-slate-400">Bottom collector</td>
                                    </tr>
                                    <tr className="bg-blue-50 font-bold">
                                        <td className="p-4">Total</td>
                                        <td className="p-4">{results.total} g</td>
                                        <td colSpan="4" className="p-4">Fineness Modulus: {results.fm}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </section>

                        {/* Summary */}
                        <section className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className={`p-6 rounded-xl flex items-center gap-4 ${results.isSufficient?'bg-green-100 text-green-800':'bg-red-100 text-red-800'}`}>
                                {results.isSufficient ? <CheckCircle /> : <AlertCircle />}
                                <div>
                                    <p className="font-bold">Sample Weight</p>
                                    <p className="text-sm">Required: {(MIN_SAMPLE_WEIGHTS[currentSpec.nominalSize]||0)/1000}kg | Current: {results.total/1000}kg</p>
                                </div>
                            </div>
                            <div className="p-6 rounded-xl bg-blue-600 text-white flex justify-between items-center shadow-lg">
                                <div><p className="text-xs uppercase opacity-80">Fineness Modulus</p><p className="text-3xl font-bold">{results.fm}</p></div>
                                <button onClick={() => {setWeights({}); setPanWeight(0);}} className="p-2 bg-blue-500 rounded hover:bg-blue-400"><RefreshCw /></button>
                            </div>
                        </section>
                    </main>

                    <footer className="text-center mt-10 text-slate-400 text-sm">
                        <p>Developed by Vaisakh G.</p>
                        <p>Automatic saving enabled via Browser Storage.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SieveAnalysisApp />);
    </script>
</body>
</html>
